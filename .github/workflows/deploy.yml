name: Build and Deploy

on:
  push:
    branches: [production]
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_NAME: paintup

jobs:
  # ============================================================================
  # Job 1: Build Docker Image and Create Deployment Package
  # ============================================================================
  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: deploy
          push: false
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/app-image.tar

      - name: Verify Docker image saved
        run: |
          echo "Verifying Docker image was saved..."
          ls -lh /tmp/app-image.tar
          echo "Docker image saved successfully"

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/app-image.tar
          retention-days: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, mbstring, exif, pcntl, bcmath, gd, zip
          coverage: none

      - name: Install Composer dependencies
        run: |
          echo "Installing Composer dependencies..."
          composer install --no-dev --no-scripts --optimize-autoloader --prefer-dist --no-interaction
          echo "Composer dependencies installed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node.js dependencies
        run: |
          echo "Installing Node.js dependencies..."
          npm ci
          echo "Node.js dependencies installed"

      - name: Build frontend assets
        run: |
          echo "Building frontend assets..."
          npm run build
          echo "Frontend assets built"

          if [ ! -d "public/build" ]; then
            echo "public/build directory not found after build!"
            exit 1
          fi
          echo "Verified public/build directory exists"

      - name: Create deployment package
        run: |
          set -euo pipefail

          # Build a clean deployment directory from an explicit allow-list.
          # This avoids shipping debug files, SQL dumps, docs, and other non-prod artifacts.
          rm -rf /tmp/deployment-src
          mkdir -p /tmp/deployment-src

          rsync -a \
            app \
            bootstrap \
            config \
            database \
            public \
            resources \
            routes \
            vendor \
            docker \
            artisan \
            composer.json \
            composer.lock \
            Dockerfile \
            docker-compose.yml \
            vite.config.js \
            package.json \
            package-lock.json \
            /tmp/deployment-src/

          # Ensure required runtime writable directories exist in package
          mkdir -p /tmp/deployment-src/storage/framework/cache
          mkdir -p /tmp/deployment-src/storage/framework/sessions
          mkdir -p /tmp/deployment-src/storage/framework/views
          mkdir -p /tmp/deployment-src/storage/logs
          mkdir -p /tmp/deployment-src/storage/app
          mkdir -p /tmp/deployment-src/bootstrap/cache

          echo "Verifying critical files before packaging..."
          test -f /tmp/deployment-src/artisan
          test -f /tmp/deployment-src/vendor/autoload.php
          test -d /tmp/deployment-src/public/build

          tar -czf deployment.tar.gz -C /tmp/deployment-src .

          if [ ! -f "deployment.tar.gz" ]; then
            echo "Failed to create deployment package"
            exit 1
          fi

          echo "Deployment package created successfully"
          ls -lh deployment.tar.gz

          echo "Verifying critical files in deployment package..."
          tar -tzf deployment.tar.gz > /tmp/pkg-filelist.txt

          CRITICAL_FILES=(
            "docker-compose.yml"
            "Dockerfile"
            "artisan"
            "vendor/autoload.php"
            "public/build/manifest.json"
          )

          for file in "${CRITICAL_FILES[@]}"; do
            if grep -qE "(^|\\./)${file}$" /tmp/pkg-filelist.txt; then
              echo "$file found in package"
            else
              echo "$file missing from package"
              exit 1
            fi
          done

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment.tar.gz
          retention-days: 1

  # ============================================================================
  # Job 2: Upload to Docker Hub
  # ============================================================================
  upload-to-docker-hub:
    name: Upload to Docker Hub
    runs-on: ubuntu-latest
    needs: build-docker-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/app-image.tar

      - name: Tag and push Docker image
        run: |
          docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  # ============================================================================
  # Job 3: Deploy to Server
  # ============================================================================
  deploy-to-server:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: upload-to-docker-hub

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connectivity
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          script: |
            set -e
            echo "SSH connection successful"
            whoami
            pwd
            uname -a

            if [ ! -d "/home/ubuntu/paintup" ]; then
              mkdir -p /home/ubuntu/paintup
              chown ubuntu:ubuntu /home/ubuntu/paintup
              chmod 775 /home/ubuntu/paintup
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found, attempting install..."
              curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
              sudo sh /tmp/get-docker.sh
              rm -f /tmp/get-docker.sh
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER || true
            fi

            if ! command -v docker-compose >/dev/null 2>&1 && ! docker compose version >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y docker-compose-plugin || true
            fi

      - name: Prepare server for deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 30s
          script: |
            rm -f /tmp/deployment.tar.gz
            mkdir -p /home/ubuntu/paintup

      - name: Copy deployment package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deployment.tar.gz"
          target: "/home/ubuntu/paintup"
          overwrite: true
          timeout: 600s

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 3600s
          script: |
            set -e

            PROJECT_DIR="/home/ubuntu/paintup"
            cd "$PROJECT_DIR"

            DOCKER_CMD="docker"
            COMPOSE_CMD="docker-compose"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker"
              COMPOSE_CMD="sudo docker-compose"
            fi
            if ! command -v docker-compose >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="$DOCKER_CMD compose"
            fi

            APP_EXISTS=$($DOCKER_CMD ps -a --format '{{.Names}}' | grep -c '^paintup_app$' || true)
            NGINX_EXISTS=$($DOCKER_CMD ps -a --format '{{.Names}}' | grep -c '^paintup_nginx$' || true)
            DB_EXISTS=$($DOCKER_CMD ps -a --format '{{.Names}}' | grep -c '^paintup_db$' || true)

            # Backup storage if available
            if [ -d "$PROJECT_DIR/storage" ]; then
              BACKUP_NAME="storage_backup_$(date +%Y%m%d_%H%M%S)"
              cp -r "$PROJECT_DIR/storage" "/tmp/$BACKUP_NAME" || true
            fi

            # Cleanup old caches (preserve storage/app)
            rm -rf bootstrap/cache/* storage/framework/cache/* storage/framework/sessions/* storage/framework/views/* storage/logs/* || true

            sudo chown -R ubuntu:ubuntu "$PROJECT_DIR" || true
            sudo chmod -R 775 "$PROJECT_DIR" || true

            tar -xzf "$PROJECT_DIR/deployment.tar.gz" --overwrite || sudo tar -xzf "$PROJECT_DIR/deployment.tar.gz" --overwrite
            rm -f "$PROJECT_DIR/deployment.tar.gz"
            sudo chown -R ubuntu:ubuntu "$PROJECT_DIR" || true

            test -f artisan
            if [ ! -f "vendor/autoload.php" ]; then
              $DOCKER_CMD run --rm -v "$(pwd):/app" -w /app composer:latest install --no-dev --optimize-autoloader --no-interaction
            fi
            if [ ! -f "public/build/manifest.json" ]; then
              IMAGE_NAME="${{ secrets.DOCKER_HUB_USERNAME }}/paintup:latest"
              $DOCKER_CMD run --rm -v "$(pwd)/public:/target" "$IMAGE_NAME" sh -c 'if [ -d /var/www/html/public/build ]; then cp -r /var/www/html/public/build /target/; fi'
            fi

            STORAGE_BACKUP=$(ls -t /tmp/storage_backup_* 2>/dev/null | head -1)
            if [ -n "${STORAGE_BACKUP:-}" ] && [ -d "$STORAGE_BACKUP" ]; then
              rm -rf "$PROJECT_DIR/storage"
              cp -r "$STORAGE_BACKUP" "$PROJECT_DIR/storage"
            fi

            mkdir -p storage/{app,framework/{cache,sessions,views},logs}

            SSL_DIR="$PROJECT_DIR/docker/nginx/ssl"
            if [ -d "$SSL_DIR" ]; then
              find "$PROJECT_DIR" -not -path "$SSL_DIR*" -exec chown ubuntu:ubuntu {} + || true
              find "$PROJECT_DIR" -not -path "$SSL_DIR*" -type d -exec chmod 775 {} + || true
              find "$PROJECT_DIR" -not -path "$SSL_DIR*" -type f -exec chmod 664 {} + || true
              sudo chown -R ubuntu:ubuntu "$SSL_DIR" || true
              sudo chmod -R 755 "$SSL_DIR" || true
            else
              chown -R ubuntu:ubuntu "$PROJECT_DIR" || true
              find "$PROJECT_DIR" -type d -exec chmod 775 {} + || true
              find "$PROJECT_DIR" -type f -exec chmod 664 {} + || true
            fi
            chmod -R 755 "$PROJECT_DIR/storage"
            chmod -R 775 "$PROJECT_DIR/bootstrap/cache"
            chmod -R 775 "$PROJECT_DIR/storage/framework"
            chmod -R 775 "$PROJECT_DIR/storage/app"
            chmod -R 775 "$PROJECT_DIR/storage/logs"

            cat > .env << 'EOF'
            APP_NAME="PaintUp"
            APP_ENV=${{ secrets.APP_ENV }}
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=${{ secrets.APP_DEBUG }}
            APP_URL=${{ secrets.APP_URL }}
            APP_LOCALE=en
            APP_TIMEZONE=UTC

            LOG_CHANNEL=stack
            LOG_LEVEL=error

            DB_CONNECTION=${{ secrets.DB_CONNECTION }}
            DB_HOST=db
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}

            SESSION_DRIVER=file
            SESSION_LIFETIME=120

            CACHE_STORE=file
            QUEUE_CONNECTION=database
            FILESYSTEM_DISK=local
            BROADCAST_CONNECTION=log


            # ==========================================
            # PhonePe Payment Configuration
            # ==========================================
            PHONEPE_CLIENT_ID=${{ secrets.PHONEPE_CLIENT_ID }}
            PHONEPE_CLIENT_SECRET=${{ secrets.PHONEPE_CLIENT_SECRET }}

            # ==========================================
            # MSG91 WhatsApp / OTP
            # ==========================================
            MSG91_AUTH_KEY=${{ secrets.MSG91_AUTH_KEY }}


            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            EOF

            cp .env .env.backup

            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | $DOCKER_CMD login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            sed -i "s|\${DOCKER_HUB_USERNAME:-[^}]*}|${{ secrets.DOCKER_HUB_USERNAME }}|g" docker-compose.yml || true

            if [ "$DB_EXISTS" -gt 0 ] && [ "$NGINX_EXISTS" -gt 0 ]; then
              $COMPOSE_CMD pull app || true
              $COMPOSE_CMD stop app || true
              $DOCKER_CMD rm -f paintup_app || true
              $COMPOSE_CMD up -d app
            else
              $COMPOSE_CMD pull || true
              if [ "$DB_EXISTS" -eq 0 ]; then
                $COMPOSE_CMD up -d db
                for i in {1..30}; do
                  if $COMPOSE_CMD exec -T db mysqladmin ping -h localhost --silent 2>/dev/null; then
                    break
                  fi
                  sleep 1
                done
              fi
              $COMPOSE_CMD up -d
            fi

            sleep 10
            $COMPOSE_CMD ps

            $COMPOSE_CMD exec --user root app chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache || true
            $COMPOSE_CMD exec --user root app chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache || true

            $COMPOSE_CMD exec app php artisan config:clear || true
            $COMPOSE_CMD exec app php artisan cache:clear || true
            $COMPOSE_CMD exec app php artisan route:clear || true
            $COMPOSE_CMD exec app php artisan view:clear || true
            $COMPOSE_CMD exec app php artisan config:cache || true
            $COMPOSE_CMD exec app php artisan route:cache || true
            $COMPOSE_CMD exec app php artisan view:cache || true
            $COMPOSE_CMD exec app php artisan optimize || true
            $COMPOSE_CMD exec app php artisan queue:restart || true

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e
            cd /home/ubuntu/paintup

            DOCKER_CMD="docker"
            COMPOSE_CMD="docker-compose"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker"
              COMPOSE_CMD="sudo docker-compose"
            fi
            if ! command -v docker-compose >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="$DOCKER_CMD compose"
            fi

            APP_RUNNING=$($DOCKER_CMD ps --format '{{.Names}}' | grep -c '^paintup_app$' || echo "0")
            NGINX_RUNNING=$($DOCKER_CMD ps --format '{{.Names}}' | grep -c '^paintup_nginx$' || echo "0")

            if [ "$APP_RUNNING" -eq 0 ] || [ "$NGINX_RUNNING" -eq 0 ]; then
              echo "Required containers are not running"
              $COMPOSE_CMD logs --tail=30 app || true
              $COMPOSE_CMD logs --tail=30 nginx || true
              exit 1
            fi

            $COMPOSE_CMD ps

      - name: Health Check
        run: |
          set -e
          MAX_RETRIES=5
          RETRY_DELAY=15
          APP_URL="${{ secrets.APP_URL }}"
          APP_URL="${APP_URL%/}"

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 --connect-timeout 5 "$APP_URL" 2>/dev/null || echo "000")
            echo "Attempt $i/$MAX_RETRIES -> HTTP $HTTP_CODE"
            if echo "$HTTP_CODE" | grep -qE "^(200|201|202|301|302|304)$"; then
              echo "Application is healthy"
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              sleep $RETRY_DELAY
            fi
          done
          echo "Health check failed after retries"
          exit 1

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" == "success" ]; then
            echo "Status: Success" >> "$GITHUB_STEP_SUMMARY"
            echo "Application: Deployed successfully" >> "$GITHUB_STEP_SUMMARY"
            echo "URL: ${{ secrets.APP_URL }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Status: Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Action Required: Check deployment logs" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
