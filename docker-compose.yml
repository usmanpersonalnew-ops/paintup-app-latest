services:
  # PHP-FPM Application
  app:
    image: ${DOCKER_HUB_USERNAME}/paintup:latest
    container_name: paintup_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    networks:
      - paintup_network
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-paintup}
      - DB_USERNAME=${DB_USERNAME:-paintup}
      - DB_PASSWORD=${DB_PASSWORD:-paintup_password}
    depends_on:
      - db
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: paintup_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    networks:
      - paintup_network
    depends_on:
      - app
    command: nginx -g "daemon off;"

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: paintup_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-paintup}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USERNAME:-paintup}
      MYSQL_PASSWORD: ${DB_PASSWORD:-paintup_password}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - paintup_network

networks:
  paintup_network:
    driver: bridge

volumes:
  db_data:
    driver: local
  certbot-webroot:
    driver: local
